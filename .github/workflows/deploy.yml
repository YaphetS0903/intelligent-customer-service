name: Deploy

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to deploy, for example main or a tag"
        required: false
        default: "main"
  push:
    tags:
      - "v*"

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_PROVIDER: mysql
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_DATABASE: tianrui_ci
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_QUERY_ATTEMPTS: 4
      MYSQL_QUERY_TIMEOUT_MS: 10000
      MYSQL_CONNECT_TIMEOUT_MS: 8000
      AUTH_SECRET: ci-auth-secret-for-enterprise-ai-support-2026
      INITIAL_ADMIN_EMAIL: admin@e2e.local
      INITIAL_ADMIN_PASSWORD: ci-only-admin-password
      E2E_TEST_PASSWORD: ci-only-test-password
      APP_BASE_URL: http://localhost:3100
      RAG_PROVIDER: local_text
      AI_CHAT_PROVIDER: custom
      AI_CHAT_BASE_URL: http://127.0.0.1:9
      AI_CHAT_API_KEY: ci-placeholder
      AI_CHAT_MODEL: ci-placeholder
      TTS_PROVIDER: custom
      TTS_API_URL: ""
      TTS_API_KEY: ""
      DIGITAL_HUMAN_PROVIDER: none
      OCR_PROVIDER: none
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tianrui_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Playwright regression
        run: npm run test:e2e

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Resolve deploy ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.git_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            export APP_DIR="${{ secrets.DEPLOY_APP_DIR }}"
            export GIT_REF="${{ steps.ref.outputs.value }}"
            cd "$APP_DIR"
            bash scripts/deploy-local.sh
