name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_PROVIDER: mysql
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_DATABASE: tianrui_ci
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_QUERY_ATTEMPTS: 4
      MYSQL_QUERY_TIMEOUT_MS: 10000
      MYSQL_CONNECT_TIMEOUT_MS: 8000
      AUTH_SECRET: ci-auth-secret-for-enterprise-ai-support-2026
      INTEGRATION_CREDENTIAL_ENCRYPTION_KEY: ci-integration-credential-encryption-key-2026
      INITIAL_ADMIN_EMAIL: admin@e2e.local
      INITIAL_ADMIN_PASSWORD: ci-only-admin-password
      E2E_TEST_PASSWORD: ci-only-test-password
      E2E_ALLOW_DATABASE_WRITE: "true"
      ALLOW_SELF_REGISTRATION: "false"
      APP_BASE_URL: http://localhost:3100
      RAG_PROVIDER: local_text
      AI_CHAT_PROVIDER: custom
      AI_CHAT_BASE_URL: http://127.0.0.1:9
      AI_CHAT_API_KEY: ci-placeholder
      AI_CHAT_MODEL: ci-placeholder
      TTS_PROVIDER: custom
      TTS_API_URL: ""
      TTS_API_KEY: ""
      DIGITAL_HUMAN_PROVIDER: none
      OCR_PROVIDER: none
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tianrui_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Playwright regression
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
